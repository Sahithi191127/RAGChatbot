name: Daily ingestion

# 10:00 AM IST = 04:30 UTC (see scheduler/README.md)
on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-ingestion
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily ingestion (fresh fetch from Groww)
        env:
          PYTHONPATH: .
          SCHEDULER_RETRY_ON_FAILURE: "true"
        run: python scheduler/daily.py --once --subprocess

      - name: Commit and push index (triggers Railway redeploy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/index/chroma data/index/metadata.json
          if git diff --staged --quiet; then
            echo "Index unchanged — no commit needed."
            exit 0
          fi
          BUILT_AT=$(python -c "import json; print(json.load(open('data/index/metadata.json'))['built_at'][:10])")
          git commit -m "chore: refresh corpus index from daily ingestion ($BUILT_AT)"
          git pull --rebase --autostash origin main
          git push origin HEAD:main

      - name: Upload ingestion artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-output-${{ github.run_id }}
          path: |
            data/index/metadata.json
            data/processed/*.json
          retention-days: 7
          if-no-files-found: ignore
