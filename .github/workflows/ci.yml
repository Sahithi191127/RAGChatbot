name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (stub LLM, uses cached index if present)
        env:
          PYTHONPATH: .
          USE_LLM_STUB: "true"
          LLM_API_KEY: ""
        run: pytest -q
